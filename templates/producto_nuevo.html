{% extends 'base.html' %}

{% block title %}
Nuevo Producto
{% endblock %}

{% block content %}

<div class="card">

    <h2>Registrar Producto</h2>

    <form>

        <div class="form-group">

            <label>Nombre</label>

            <input
                type="text"
                name="nombre">

        </div>

        <div class="form-group">

            <label>Precio</label>

            <input
                type="number"
                step="0.01"
                name="precio">

        </div>

        <div class="form-group">

            <label>Stock</label>

            <input
                type="number"
                name="stock">

        </div>

        <br>

        <button class="btn-guardar">

            Guardar Producto

        </button>

    </form>

</div>

{% endblock %}
