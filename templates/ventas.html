{% extends 'base.html' %}

{% block title %}
Ventas
{% endblock %}

{% block content %}

<div class="card">

    <h2>Registrar Venta</h2>

    <form action="/ventas/registrar" method="POST">

        <div class="form-grid">

            <div class="form-group">

                <label>Producto</label>

                <select name="producto_id" required>

                    <option value="">Seleccione un producto</option>

                    {% for producto in productos %}

                    <option value="{{ producto.id }}">

                        {{ producto.nombre }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="form-group">

                <label>Cantidad</label>

                <input
                    type="number"
                    name="cantidad"
                    min="1"
                    required>

            </div>

            <div class="form-group">

                <label>Fecha</label>

                <input
                    type="date"
                    name="fecha"
                    value="{{ '' }}"
                    required>

            </div>

        </div>

        <button>

            Registrar Venta

        </button>

    </form>

</div>

<div class="card">

    <h2>Historial de Ventas</h2>

    <table>

        <thead>

            <tr>

                <th>ID</th>

                <th>Producto</th>

                <th>Cantidad</th>

                <th>Fecha</th>

            </tr>

        </thead>

        <tbody>

            {% for venta in ventas %}

            <tr>

                <td>{{ venta.id }}</td>

                <td>{{ venta.producto }}</td>

                <td>{{ venta.cantidad }}</td>

                <td>{{ venta.fecha }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
